name: grimread
description: GrimRead — Gothic Speed Reader. RSVP reading app with medieval library design.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── File picking ─────────────────────────────────────────────
  file_picker: ^8.1.2
  permission_handler: ^11.3.1

  # ── EPUB parsing (pure Dart, no UI widgets needed) ───────────
  epubx: ^3.0.1

  # ── PDF text extraction ───────────────────────────────────────
  syncfusion_flutter_pdf: ^26.1.35

  # ── ZIP / DOCX / FB2 parsing ──────────────────────────────────
  archive: ^3.6.1
  xml: ^6.5.0

  # ── Storage ───────────────────────────────────────────────────
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # ── UI & fonts ────────────────────────────────────────────────
  google_fonts: ^6.2.1
  animations: ^2.0.11

  # ── Utils ─────────────────────────────────────────────────────
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Fonts loaded via google_fonts package at runtime (no local font files needed)
  # To bundle fonts offline: download from Google Fonts, place in assets/fonts/,
  # and uncomment the fonts: section below.

  assets:
    - assets/icons/
    - assets/splash/
